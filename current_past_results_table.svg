<svg width="1080" height="800" viewBox="0 0 1080 800" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-labelledby="title desc">
  <title id="title">Diagnostic Test Results Report</title>
  <desc id="desc">A lab-style report of current lab results compared with readings from 45 and 90 days ago.</desc>

  <style>
    :root {
      --blue: #225CFF;
      --ink: #14213D;
      --muted: #6B7280;
      --good: #15803D;
      --abnormal: #EA580C;
      --white: #FFFFFF;
      --line: #E6EBF3;
      --line-strong: #D3DBEA;
    }

    .bg { fill: var(--white); }
    .title { font: 200 38px Inter, Arial, sans-serif; fill: var(--ink); letter-spacing: -0.3px; }
    .meta { font: 200 20px Inter, Arial, sans-serif; fill: var(--muted); }
    .meta-value { fill: var(--ink); }
    .rule { stroke: var(--line); stroke-width: 1; }
    .rule-strong { stroke: var(--line-strong); stroke-width: 1.25; }
    .th { font: 200 26px Inter, Arial, sans-serif; fill: var(--ink); letter-spacing: -0.1px; }
    .th-sub { font: 200 18px Inter, Arial, sans-serif; fill: var(--muted); }
    .test-name { font: 200 24px Inter, Arial, sans-serif; fill: var(--ink); }
    .patient-info { font: 200 24px Inter, Arial, sans-serif; fill: var(--ink); }
    .range { font: 200 17px Inter, Arial, sans-serif; fill: var(--muted); }
    .result { font: 200 25px Inter, Arial, sans-serif; fill: var(--ink); text-anchor: middle; dominant-baseline: middle; }
    .good { fill: var(--good); }
    .abnormal { fill: var(--abnormal); }
    .unit { font-size: 16px; opacity: 0.7; }
    .date-token { font: 200 20px Inter, Arial, sans-serif; fill: var(--ink); }
  </style>

  <!-- White canvas -->
  <rect class="bg" width="1080" height="800"/>

  <!-- Brand mark — top right -->
  <image
    href="assets/images/drswift_leaf_logo_precise_trace.svg"
    xlink:href="assets/images/drswift_leaf_logo_precise_trace.svg"
    x="957"
    y="22"
    width="80"
    height="86"
    preserveAspectRatio="xMidYMid meet"
    opacity="0.96"
  >
    <title>Dr.Swift Diagnostics</title>
  </image>

  <!-- Patient details -->
  <text x="90" y="72" class="patient-info"><tspan>Patient Name: XXXXX</tspan><tspan dx="72">Account: XXXXXX</tspan></text>

  <!-- Report title -->
  <text x="100" y="118" class="title">Test results</text>

  <!-- Report metadata row -->
  <text x="90" y="152" class="meta">Test ordered: <tspan class="meta-value">{yesterday}</tspan></text>
  <text x="430" y="152" class="meta">Sample collected: <tspan class="meta-value">{today}</tspan></text>
  <text x="760" y="152" class="meta">Report date: <tspan class="meta-value">{today}</tspan></text>

  <line class="rule" x1="90" y1="180" x2="990" y2="180"/>

  <!-- Column headers -->
  <text x="110" y="246" class="th">Test name</text>
  <text x="110" y="272" class="th-sub">Reference range</text>

  <text x="564.5" y="244" class="date-token" text-anchor="middle">{today}</text>
  <text x="564.5" y="272" class="th-sub" text-anchor="middle">Current</text>

  <text x="729.5" y="244" class="date-token" text-anchor="middle">{45_days_ago}</text>
  <text x="729.5" y="272" class="th-sub" text-anchor="middle">Past</text>

  <text x="894" y="244" class="date-token" text-anchor="middle">{90_days_ago}</text>
  <text x="894" y="272" class="th-sub" text-anchor="middle">Past</text>

  <line class="rule-strong" x1="90" y1="296" x2="990" y2="296"/>

  <!-- Row 1 -->
  <text x="110" y="336" class="test-name">HbA1c</text>
  <text x="110" y="362" class="range">Normal: below 5.7%</text>
  <text x="564.5" y="342" class="result good">5.2<tspan class="unit"> %</tspan></text>
  <text x="729.5" y="342" class="result good">5.6<tspan class="unit"> %</tspan></text>
  <text x="894" y="342" class="result abnormal">6.0<tspan class="unit"> %</tspan></text>

  <line class="rule" x1="90" y1="387" x2="990" y2="387"/>

  <!-- Row 2 -->
  <text x="110" y="426" class="test-name">Fasting Glucose</text>
  <text x="110" y="452" class="range">Normal: 70–99 mg/dL</text>
  <text x="564.5" y="432" class="result good">92<tspan class="unit"> mg/dL</tspan></text>
  <text x="729.5" y="432" class="result abnormal">108<tspan class="unit"> mg/dL</tspan></text>
  <text x="894" y="432" class="result good">96<tspan class="unit"> mg/dL</tspan></text>

  <line class="rule" x1="90" y1="477" x2="990" y2="477"/>

  <!-- Row 3 -->
  <text x="110" y="516" class="test-name">Vitamin D</text>
  <text x="110" y="542" class="range">Sufficient: 30–100 ng/mL</text>
  <text x="564.5" y="522" class="result abnormal">22<tspan class="unit"> ng/mL</tspan></text>
  <text x="729.5" y="522" class="result abnormal">18<tspan class="unit"> ng/mL</tspan></text>
  <text x="894" y="522" class="result good">34<tspan class="unit"> ng/mL</tspan></text>

  <line class="rule" x1="90" y1="567" x2="990" y2="567"/>

  <!-- Row 4 -->
  <text x="110" y="606" class="test-name">TSH</text>
  <text x="110" y="632" class="range">Reference: 0.4–4.0 mIU/L</text>
  <text x="564.5" y="612" class="result good">2.1<tspan class="unit"> mIU/L</tspan></text>
  <text x="729.5" y="612" class="result good">2.4<tspan class="unit"> mIU/L</tspan></text>
  <text x="894" y="612" class="result good">2.8<tspan class="unit"> mIU/L</tspan></text>

  <line class="rule" x1="90" y1="657" x2="990" y2="657"/>

  <!-- Row 5 -->
  <text x="110" y="696" class="test-name">LDL Cholesterol</text>
  <text x="110" y="722" class="range">Optimal: below 100 mg/dL</text>
  <text x="564.5" y="702" class="result abnormal">126<tspan class="unit"> mg/dL</tspan></text>
  <text x="729.5" y="702" class="result abnormal">138<tspan class="unit"> mg/dL</tspan></text>
  <text x="894" y="702" class="result good">94<tspan class="unit"> mg/dL</tspan></text>

  <line class="rule" x1="90" y1="747" x2="990" y2="747"/>
</svg>
