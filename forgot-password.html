<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password | Dr.Swift Diagnostics</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=google-auth-3">
    <link rel="icon" href="assets/images/drswift_leaf_logo_precise_trace.svg" type="image/svg+xml">
  </head>
  <body class="auth-page">
    <header class="site-header" id="site-header">
      <nav class="navbar container" aria-label="Primary navigation">
        <a class="brand" href="index.html"><img class="brand-mark" src="assets/images/drswift_leaf_logo_precise_trace.svg" alt="" width="40" height="40"><span>Dr.Swift Diagnostics</span></a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-menu"><span class="sr-only">Menu</span><span></span><span></span><span></span></button>
        <div class="nav-menu" id="primary-menu">
          <div class="nav-links"><a href="tests.html">Tests</a><a href="reports.html">Reports</a><a href="about.html">About</a></div>
          <div class="nav-actions"><a class="cart-link" href="cart.html" aria-label="View cart"><svg class="ui-icon" aria-hidden="true"><use href="assets/images/ui-icons.svg#icon-cart"></use></svg><span>Cart</span><span class="cart-count" data-cart-count hidden>0</span></a><a class="button primary nav-cta" href="login.html">My Account</a></div>
        </div>
      </nav>
    </header>
    <main class="auth-shell">
      <div class="container container--centered">
        <div class="auth-card">
          <div class="auth-card__header">
            <p class="eyebrow">Account recovery</p>
            <h1>Reset your password</h1>
            <p>We will send a reset link to your email or OTP to your phone.</p>
          </div>
          <form class="auth-form" data-auth-form novalidate>
            <div class="form-field">
              <label for="reset-email">Email or phone</label>
              <input id="reset-email" type="text" name="contact" required>
            </div>
            <button class="button primary full" type="submit">Send reset link</button>
            <p class="auth-success" data-auth-success hidden>Reset instructions sent. Backend connection coming soon.</p>
          </form>
          <p class="auth-alt"><a href="login.html">Back to sign in</a></p>
        </div>
      </div>
    </main>
    <footer class="site-footer"><div class="container footer-bottom footer-bottom--plain"><p>&copy; 2026 Dr.Swift Diagnostics</p></div></footer>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase-config.js?v=3"></script>
    <script src="assets/js/google-auth.js?v=6"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
