<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password | Dr.Swift Diagnostics</title>
    <meta name="description" content="Reset your Dr.Swift Diagnostics account password.">
    <link rel="stylesheet" href="assets/css/styles.css?v=auth-mobile-1">
    <link rel="icon" href="assets/images/drswift_leaf_logo_precise_trace.svg" type="image/svg+xml">
  </head>
  <body class="auth-page">
    <header class="site-header site-header--auth" id="site-header">
      <nav class="navbar container" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="Dr.Swift Diagnostics home">
          <img class="brand-mark" src="assets/images/drswift_leaf_logo_precise_trace.svg" alt="" width="40" height="40">
          <span>Dr.Swift Diagnostics</span>
        </a>
        <a class="auth-nav-back" href="login.html">Back to sign in</a>
      </nav>
    </header>
    <main class="auth-shell">
      <div class="container container--centered auth-shell__card">
        <div class="auth-card">
          <div class="auth-card__header auth-card__header--login">
            <h1 class="login-hero-title">Reset password</h1>
            <p class="login-lead">Enter the email on your account. We’ll send a reset link if it matches.</p>
          </div>
          <form class="auth-form" data-auth-form novalidate>
            <div class="form-field">
              <label for="reset-email">Email</label>
              <input
                id="reset-email"
                type="email"
                name="contact"
                autocomplete="email"
                inputmode="email"
                placeholder="you@email.com"
                required
              >
            </div>
            <button class="button primary full" type="submit">Send reset link</button>
            <p class="auth-success" data-auth-success hidden>If an account exists for that email, reset instructions will be sent. Backend connection coming soon.</p>
          </form>
          <p class="auth-alt"><a href="login.html">Back to sign in</a></p>
        </div>
      </div>
    </main>
    <footer class="site-footer site-footer--auth">
      <div class="container footer-bottom footer-bottom--flat">
        <p>&copy; 2026 Dr.Swift Diagnostics</p>
      </div>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase-config.js?v=3"></script>
    <script src="assets/js/google-auth.js?v=6"></script>
    <script src="assets/js/main.js?v=session-flow-1"></script>
    <script src="assets/js/auth.js?v=auth-mobile-1"></script>
  </body>
</html>
